name: Build Courier iOS

on:
  push:
    branches: [main, staging]
    paths:
      - 'Courier/**'
      - '.github/workflows/courier-ios.yml'
      - 'sync_pbx.rb'
  pull_request:
    branches: [main]
    paths:
      - 'Courier/**'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  XCODE_VERSION: '16.1'
  APP_SCHEME: 'Courier'
  PROJECT_PATH: 'Courier/Courier.xcodeproj'
  BUNDLE_ID: 'id.tembus.courier'

jobs:
  # ──────────────────────────────────────────────
  # Phase 1: Build & Test
  # ──────────────────────────────────────────────
  build-and-test:
    name: Build & Test (Courier)
    runs-on: macos-15
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode ${{ env.XCODE_VERSION }}
        run: sudo xcode-select -s /Applications/Xcode_${{ env.XCODE_VERSION }}.app/Contents/Developer

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Install Dependencies (xcpretty & xcodeproj)
        run: gem install xcpretty xcodeproj

      - name: Sync Xcode Project Files
        run: ruby sync_pbx.rb

      - name: Setup Swift Package Dependencies
        run: ruby setup_spm.rb

      - name: Clean Invalid SPM Products
        run: |
          cat << 'EOF' > clean_pbx.rb
          require 'xcodeproj'
          project = Xcodeproj::Project.open('Courier/Courier.xcodeproj')
          target = project.targets.find { |t| t.name == 'Courier' }
          if target
            target.package_product_dependencies.delete_if { |dep| dep.product_name == 'MLKitVision' }
            target.frameworks_build_phase.files.delete_if { |f| f.product_ref && f.product_ref.respond_to?(:product_name) && f.product_ref.product_name == 'MLKitVision' }
            project.save
            puts "Cleaned MLKitVision from project.pbxproj"
          end
          EOF
          ruby clean_pbx.rb


      - name: Build for Simulator (Debug)
        run: |
          xcodebuild build \
            -project "${{ env.PROJECT_PATH }}" \
            -scheme "${{ env.APP_SCHEME }}" \
            -sdk iphonesimulator \
            -destination 'generic/platform=iOS Simulator' \
            -configuration Debug \
            SDKROOT=iphonesimulator \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            ARCHS=x86_64 \
            ONLY_ACTIVE_ARCH=NO \
            ASSETCATALOG_COMPILER_GENERATE_SWIFT_ASSET_SYMBOL_EXTENSIONS=NO \
            ASSETCATALOG_COMPILER_SKIP_APP_STORE_DEPLOYMENT=YES \
            2>&1 | tee /tmp/build_courier.log ; BUILD_EXIT=${PIPESTATUS[0]}
          if [ $BUILD_EXIT -ne 0 ]; then
            echo ""
            echo "====== EXTRACTED BUILD ERRORS ======"
            grep -n 'error:' /tmp/build_courier.log | grep -v '^Binary\|note:' | head -40
            echo "====================================="
          fi
          exit $BUILD_EXIT

  # ──────────────────────────────────────────────
  # Phase 2: Archive & Upload to TestFlight
  # Only runs on push to main
  # ──────────────────────────────────────────────
  deploy-testflight:
    name: Deploy to TestFlight (Courier)
    runs-on: macos-15
    needs: build-and-test
    if: false # Temporarily disabled during active development: github.event_name == 'push' && github.ref == 'refs/heads/main'
    timeout-minutes: 60
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode ${{ env.XCODE_VERSION }}
        run: sudo xcode-select -s /Applications/Xcode_${{ env.XCODE_VERSION }}.app/Contents/Developer

      - name: Install xcpretty
        run: gem install xcpretty --no-document

      - name: Install Apple Certificate
        env:
          BUILD_CERTIFICATE_BASE64: ${{ secrets.COURIER_CERTIFICATE_BASE64 }}
          P12_PASSWORD: ${{ secrets.COURIER_P12_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          CERTIFICATE_PATH=$RUNNER_TEMP/build_certificate.p12
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db

          echo -n "$BUILD_CERTIFICATE_BASE64" | base64 --decode -o $CERTIFICATE_PATH

          security create-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security import $CERTIFICATE_PATH \
            -P "$P12_PASSWORD" \
            -A -t cert -f pkcs12 \
            -k $KEYCHAIN_PATH
          security list-keychain -d user -s $KEYCHAIN_PATH

      - name: Install Provisioning Profile
        env:
          PROVISIONING_PROFILE_BASE64: ${{ secrets.COURIER_PROVISIONING_PROFILE_BASE64 }}
        run: |
          PP_PATH=$RUNNER_TEMP/build_pp.mobileprovision
          echo -n "$PROVISIONING_PROFILE_BASE64" | base64 --decode -o $PP_PATH
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          cp $PP_PATH ~/Library/MobileDevice/Provisioning\ Profiles

      - name: Increment Build Number
        run: |
          BUILD_NUMBER=${{ github.run_number }}
          /usr/libexec/PlistBuddy \
            -c "Set :CFBundleVersion $BUILD_NUMBER" \
            "Courier/Courier/Resources/Info.plist"

      - name: Archive
        run: |
          xcodebuild archive \
            -project "${{ env.PROJECT_PATH }}" \
            -scheme "${{ env.APP_SCHEME }}" \
            -configuration Release \
            -archivePath $RUNNER_TEMP/Courier.xcarchive \
            CODE_SIGN_STYLE=Manual \
            DEVELOPMENT_TEAM="${{ secrets.APPLE_TEAM_ID }}"

      - name: Write ExportOptions.plist
        run: |
          python3 -c "
          import os
          content = '''<?xml version=\"1.0\" encoding=\"UTF-8\"?>
          <!DOCTYPE plist PUBLIC \"-//Apple//DTD PLIST 1.0//EN\" \"http://www.apple.com/DTDs/PropertyList-1.0.dtd\">
          <plist version=\"1.0\">
          <dict>
            <key>method</key>
            <string>app-store-connect</string>
            <key>teamID</key>
            <string>''' + os.environ['TEAM_ID'] + '''</string>
            <key>uploadBitcode</key>
            <false/>
            <key>uploadSymbols</key>
            <true/>
          </dict>
          </plist>'''
          with open(os.environ['RUNNER_TEMP'] + '/ExportOptions.plist', 'w') as f:
            f.write(content)
          "
        env:
          TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}

      - name: Export IPA
        run: |
          xcodebuild -exportArchive \
            -archivePath $RUNNER_TEMP/Courier.xcarchive \
            -exportOptionsPlist $RUNNER_TEMP/ExportOptions.plist \
            -exportPath $RUNNER_TEMP/export

      - name: Upload to TestFlight
        env:
          APP_STORE_CONNECT_API_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
          APP_STORE_CONNECT_API_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_API_ISSUER_ID }}
          APP_STORE_CONNECT_API_KEY_BASE64: ${{ secrets.APP_STORE_CONNECT_API_KEY_BASE64 }}
        run: |
          API_KEY_PATH=$RUNNER_TEMP/AuthKey_${APP_STORE_CONNECT_API_KEY_ID}.p8
          echo -n "$APP_STORE_CONNECT_API_KEY_BASE64" | base64 --decode -o $API_KEY_PATH

          xcrun altool --upload-app \
            --type ios \
            --file "$RUNNER_TEMP/export/Courier.ipa" \
            --apiKey "$APP_STORE_CONNECT_API_KEY_ID" \
            --apiIssuer "$APP_STORE_CONNECT_API_ISSUER_ID" \
            --private-key $API_KEY_PATH

      - name: Clean up Keychain
        if: always()
        run: |
          security delete-keychain $RUNNER_TEMP/app-signing.keychain-db || true
